<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentrix</title>

<style>
body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background:#f8f6f1;
}

/* HEADER */
.header{
padding:20px;
font-size:18px;
font-weight:600;
color:#222;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:15px;
}

/* CARD */
.card{
background:white;
padding:15px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* BIG CARD */
.big{
grid-column:1/3;
}

/* TEXT */
.title{
font-size:12px;
color:#777;
}

.value{
font-size:16px;
font-weight:600;
color:#111;
margin-top:5px;
}

/* SOFT COLORS */
.blue{background:#eef2ff;}
.orange{background:#fff7ed;}
.purple{background:#f5f3ff;}
.gray{background:#f1f5f9;}

/* NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid #eee;
}

.nav div{
font-size:12px;
color:#555;
}
</style>

</head>

<body>

<div class="header">Dashboard</div>

<div class="grid">

<div class="card blue">
<div class="title">Income</div>
<div class="value">Tsh 150,000</div>
</div>

<div class="card orange">
<div class="title">Expenses</div>
<div class="value">Tsh 80,000</div>
</div>

<div class="card big purple">
<div class="title">Net Profit</div>
<div class="value">Tsh 70,000</div>
</div>

<div class="card gray">
<div class="title">Products</div>
<div class="value">25</div>
</div>

<div class="card gray">
<div class="title">Orders</div>
<div class="value">12</div>
</div>

</div>

<div class="nav">
<div>🏠 Home</div>
<div>📦 Stock</div>
<div>💰 Payments</div>
<div>👤 Profile</div>
</div>

</body>
</html>
